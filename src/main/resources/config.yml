# RtpQueue Advance Configuration
# ================================

# GUI Settings
gui:
  title: "&6&lRTP Queue &8| &fWorld Selection"
  size: 27  # 9, 18, 27, 36, 45, 54

  status:
    in-queue: "&c→ CLICK to Leave Queue"
    not-in-queue: "&a→ CLICK to Queue"

# Queue Settings
queue:
  max-players: 2           # Maximum players needed to start teleport
  countdown-seconds: 3     # Countdown before teleport (3-2-1 Let's Go!)

rtp-settings:
  # List of biomes to avoid.
  # Use Bukkit Biome names (e.g., OCEAN, DEEP_OCEAN, DARK_FOREST)
  # Full list: https://jd.papermc.io/paper/1.21/org/bukkit/block/Biome.html
  blacklisted-biomes:
    - "OCEAN"
    - "DEEP_OCEAN"
    - "LUKEWARM_OCEAN"
    - "WARM_OCEAN"
    - "COLD_OCEAN"
    - "FROZEN_OCEAN"
    - "DEEP_LUKEWARM_OCEAN"
    - "DEEP_WARM_OCEAN"
    - "DEEP_COLD_OCEAN"
    - "DEEP_FROZEN_OCEAN"
    - "RIVER"
    - "FROZEN_RIVER"

# Messages
messages:
  prefix: "&aRTPQUEUE &8» &r"
  joined-queue: "&aYou joined the queue for &e%world%&a! &7(%current%/%max% players)"
  left-queue: "&cYou left the queue for &e%world%&c."
  opponent-found: "&aOpponent found, you will be teleported!"
  teleportation-countdown: "&eTeleportation in &c%seconds%s"
  teleported: "&aYou have been teleported!"
  already-in-queue: "&cYou are already in a queue!"
  opponent-left: "&cYour opponent left! You've been placed back at the front of the queue."
  not-in-queue: "&cYou are not in any queue!"
  world-not-found: "&cWorld not found!"
  no-permission: "&cYou don't have permission to use this!"
  broadcast-message-hidden: "&cYou will no longer see RTP queue messages."
  broadcast-message-shown: "&aYou will now see RTP queue messages."
  config-reloaded: "&aConfiguration reloaded successfully!"
  no-spot: "&cNo safe spot found, try again in a bit"

# Broadcast Settings (shown to all players)
broadcast:
  enabled: true
  header: "&a✦ &a&lRTPQUEUE &a✦"
  lines:
    - "&e%player% &7is waiting for"
    - "&7an opponent to fight!"
  footer: "&a+ /rtpqueue +"

# Title Settings (shown on screen when player joins queue)
title:
  enabled: true
  join-title: "&a&l+"
  join-subtitle: "&aJoined &e&lRTPQueue&a!"
  found-title: "&a&l✓"
  found-subtitle: "&aOpponent found!"
  fade-in: 10
  stay: 40
  fade-out: 10

# Action Bar Settings (shown at bottom of screen)
actionbar:
  enabled: true
  message: "&7Waiting for a &aplayer &7in &a/rtpqueue &7(%current%/%max%)"
  interval: 20  # Ticks between each actionbar refresh (20 ticks = 1 second, keeps it visible until player found)

# Join Message Settings (shown to the player who joined)
join-message:
  enabled: true
  message: "&aRTPQUEUE &8» &7You joined the RTPQueue, wait for an opponent."

# Worlds Configuration
# Each world needs:
# - enabled: true/false
# - display-name: Name shown in GUI
# - description: Description shown in lore
# - material: Block/Item to show in GUI
# - slot: Position in GUI (0-53)
# - spawn-range:
#     min: Minimum distance from center
#     max: Maximum distance from center
# - center: Center point for RTP (uses world spawn if not set)

worlds:
  world:
    enabled: true
    display-name: "&a&lOVERWORLD"
    world-item-lore:
      - ""
      - "&e&lInformation:"
      - "&7Click here to queue for"
      - "&7the &f%world% &7world!"
      - ""
      - "&6★ &fPlayers in queue: &a%current%&7/&e%max%"
      - ""
      - "%status%"
    material: GRASS_BLOCK
    slot: 11
    spawn-range:
      min: 100
      max: 5000
    center:
      x: 0
      z: 0
      
  world_nether:
    enabled: true
    display-name: "&c&lNETHER"
    world-item-lore:
      - ""
      - "&e&lInformation:"
      - "&7Click here to queue for"
      - "&7the &f%world% &7world!"
      - ""
      - "&6★ &fPlayers in queue: &a%current%&7/&e%max%"
      - ""
      - "%status%"
    material: NETHERRACK
    slot: 13
    spawn-range:
      min: 50
      max: 1000
    center:
      x: 0
      z: 0
      
  world_the_end:
    enabled: true
    display-name: "&5&lTHE END"
    world-item-lore:
      - ""
      - "&e&lInformation:"
      - "&7Click here to queue for"
      - "&7the &f%world% &7world!"
      - ""
      - "&6★ &fPlayers in queue: &a%current%&7/&e%max%"
      - ""
      - "%status%"
    material: END_STONE
    slot: 15
    spawn-range:
      min: 100
      max: 2000
    center:
      x: 0
      z: 0

